<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rey Batukam</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    padding:30px;
}

.sahur{
    font-size:30px;
    animation:gerak 2s infinite;
}

h1{
    font-size:60px;
    margin:20px 0;
}

p{
    font-size:20px;
    color:#cbd5e1;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:#2563eb;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.1);
}

@keyframes gerak{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<div class="sahur">
🪑 TUNG TUNG SAHUR 🪑
</div>

<h1>REY BATUKAM</h1>

<p>Mahasiswa Ilmu Komputer</p>
<p>RAJA KODING DI INDONESIA</p>

<br>

<a href="#" class="btn">Instagram</a>
<a href="#" class="btn">TikTok</a>
<a href="#" class="btn">GitHub</a>

</div>

</body>
</html>
