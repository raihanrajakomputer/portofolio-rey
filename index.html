<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rey Batukam</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    padding:30px;
}

.foto{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid white;
    margin:20px 0;
    animation:borderRGB 2s linear infinite;
}

.sahur{
    font-size:35px;
    font-weight:bold;
    animation:
        gerak 2s infinite,
        rgb 3s linear infinite;
}

h1{
    font-size:60px;
    margin:20px 0;
    animation:rgb 2s linear infinite;
}

p{
    font-size:20px;
    color:#cbd5e1;
    margin:5px 0;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:#2563eb;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px cyan;
}

@keyframes gerak{
    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}

@keyframes rgb{
    0%{
        color:red;
        text-shadow:
            0 0 10px red,
            0 0 20px red,
            0 0 40px red;
    }

    20%{
        color:orange;
        text-shadow:
            0 0 10px orange,
            0 0 20px orange,
            0 0 40px orange;
    }

    40%{
        color:yellow;
        text-shadow:
            0 0 10px yellow,
            0 0 20px yellow,
            0 0 40px yellow;
    }

    60%{
        color:lime;
        text-shadow:
            0 0 10px lime,
            0 0 20px lime,
            0 0 40px lime;
    }

    80%{
        color:cyan;
        text-shadow:
            0 0 10px cyan,
            0 0 20px cyan,
            0 0 40px cyan;
    }

    100%{
        color:magenta;
        text-shadow:
            0 0 10px magenta,
            0 0 20px magenta,
            0 0 40px magenta;
    }
}

@keyframes borderRGB{
    0%{
        border-color:red;
        box-shadow:0 0 25px red;
    }

    25%{
        border-color:yellow;
        box-shadow:0 0 25px yellow;
    }

    50%{
        border-color:lime;
        box-shadow:0 0 25px lime;
    }

    75%{
        border-color:cyan;
        box-shadow:0 0 25px cyan;
    }

    100%{
        border-color:magenta;
        box-shadow:0 0 25px magenta;
    }
}

</style>
</head>

<body>

<div class="container">

<div class="sahur">
 TUNG TUNG SAHUR 
</div>

<img src="rajasigma.png" class="foto">

<h1>REY BATUKAM</h1>

<p>Mahasiswa Ilmu Komputer</p>
<p>RAJA KODING DI INDONESIA</p>

<br>

<a href="https://www.tiktok.com/@ryoiko_" class="btn" target="_blank">
TikTok Saya
</a>

<a href="#" class="btn">GitHub</a>

</div>

</body>
</html>
