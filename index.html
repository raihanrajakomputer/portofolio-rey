```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rey Batukam</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Calibri, Arial, sans-serif;
}

body{
    background:linear-gradient(
        135deg,
        #ffb6d9,
        #ff8fc7,
        #ff69b4
    );
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
}

.heart{
    position:absolute;
    font-size:28px;
    animation:floatUp linear infinite;
}

.sparkle{
    position:absolute;
    font-size:20px;
    animation:twinkle 2s infinite;
}

.container{
    text-align:center;
    padding:30px;
    position:relative;
    z-index:10;
}

.foto{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid white;
    margin:20px 0;
    animation:borderRGB 2s linear infinite;
}

.sahur{
    font-size:35px;
    font-weight:bold;
    animation:
        gerak 2s infinite,
        rgb 3s linear infinite;
}

h1{
    font-size:60px;
    margin:20px 0;
    animation:rgb 2s linear infinite;
}

p{
    font-size:20px;
    color:white;
    margin:5px 0;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:#2563eb;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px cyan;
}

.popup{
    margin-top:20px;
    font-size:30px;
    font-weight:bold;
    display:none;
    animation:rgb 2s linear infinite;
}

@keyframes gerak{
    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-100px);
    }
}

@keyframes twinkle{
    0%,100%{
        opacity:0.2;
    }

    50%{
        opacity:1;
    }
}

@keyframes rgb{
    0%{
        color:red;
        text-shadow:
            0 0 10px red,
            0 0 20px red,
            0 0 40px red;
    }

    20%{
        color:orange;
        text-shadow:
            0 0 10px orange,
            0 0 20px orange,
            0 0 40px orange;
    }

    40%{
        color:yellow;
        text-shadow:
            0 0 10px yellow,
            0 0 20px yellow,
            0 0 40px yellow;
    }

    60%{
        color:lime;
        text-shadow:
            0 0 10px lime,
            0 0 20px lime,
            0 0 40px lime;
    }

    80%{
        color:cyan;
        text-shadow:
            0 0 10px cyan,
            0 0 20px cyan,
            0 0 40px cyan;
    }

    100%{
        color:magenta;
        text-shadow:
            0 0 10px magenta,
            0 0 20px magenta,
            0 0 40px magenta;
    }
}

@keyframes borderRGB{
    0%{
        border-color:red;
        box-shadow:0 0 25px red;
    }

    25%{
        border-color:yellow;
        box-shadow:0 0 25px yellow;
    }

    50%{
        border-color:lime;
        box-shadow:0 0 25px lime;
    }

    75%{
        border-color:cyan;
        box-shadow:0 0 25px cyan;
    }

    100%{
        border-color:magenta;
        box-shadow:0 0 25px magenta;
    }
}

</style>
</head>

<body>

<div class="hearts">

<div class="heart" style="left:5%; animation-duration:8s;">💖</div>
<div class="heart" style="left:15%; animation-duration:12s;">💕</div>
<div class="heart" style="left:25%; animation-duration:10s;">💗</div>
<div class="heart" style="left:35%; animation-duration:14s;">💞</div>
<div class="heart" style="left:45%; animation-duration:9s;">💖</div>
<div class="heart" style="left:55%; animation-duration:13s;">💕</div>
<div class="heart" style="left:65%; animation-duration:11s;">💗</div>
<div class="heart" style="left:75%; animation-duration:15s;">💞</div>
<div class="heart" style="left:85%; animation-duration:10s;">💖</div>

<div class="sparkle" style="top:10%; left:20%;">✨</div>
<div class="sparkle" style="top:30%; left:70%;">✨</div>
<div class="sparkle" style="top:60%; left:15%;">✨</div>
<div class="sparkle" style="top:80%; left:50%;">✨</div>

</div>

<div class="container">

<div class="sahur">
TUNG TUNG SAHUR
</div>

<img src="rajasigma.png" class="foto">

<h1>REY BATUKAM</h1>

<p>Mahasiswa Ilmu Komputer</p>
<p>RAJA KODING DI INDONESIA</p>

</button>

</div>

</div>

    document.getElementById("anjayText").style.display="block";
}
</script>

</body>
</html>
```
